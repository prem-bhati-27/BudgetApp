<!-- @dsCard group="Type" viewport="700x200" name="Headings — Inter" subtitle="Title → heading → subheading, Inter SemiBold" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-ui); padding: 22px; }
  .row { display:flex; align-items:baseline; gap: 16px; padding: 5px 0; }
  .t { color: var(--text-primary); }
  .tag { color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; }
</style>
</head>
<body>
  <div class="row"><span class="t" style="font-size:var(--title-size);font-weight:600;letter-spacing:var(--title-spacing)">My spending</span><span class="tag">title · 28px / 600</span></div>
  <div class="row"><span class="t" style="font-size:var(--heading-size);font-weight:600">New Group</span><span class="tag">heading · 20px / 600</span></div>
  <div class="row"><span class="t" style="font-size:var(--subheading-size);font-weight:600">Flatmates — Gurgaon</span><span class="tag">subheading · 16px / 600</span></div>
</body>
</html>
