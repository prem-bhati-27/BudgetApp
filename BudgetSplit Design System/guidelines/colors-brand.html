<!-- @dsCard group="Colors" viewport="700x150" name="Brand" subtitle="Teal primary + coral highlight" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-ui); padding: 20px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-md); }
  .name { color: var(--text-primary); font-size: 12px; font-weight: 600; margin-top: 10px; }
  .hex { color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="name">accent</div><div class="hex">#20C4B8</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-deep)"></div><div class="name">accent-deep</div><div class="hex">#15A89D</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-muted); border:1px solid var(--border)"></div><div class="name">accent-muted</div><div class="hex">#0E2C29</div></div>
    <div class="sw"><div class="chip" style="background:var(--coral)"></div><div class="name">coral</div><div class="hex">#FF6F61</div></div>
    <div class="sw"><div class="chip" style="background:var(--coral-muted); border:1px solid var(--border)"></div><div class="name">coral-muted</div><div class="hex">#3A1714</div></div>
  </div>
</body>
</html>
