<!-- @dsCard group="Colors" viewport="700x150" name="Semantic & Health" subtitle="Money kinds and budget health" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-ui); padding: 20px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-md); }
  .name { color: var(--text-primary); font-size: 12px; font-weight: 600; margin-top: 10px; }
  .hex { color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--income)"></div><div class="name">income</div><div class="hex">#2BD49B</div></div>
    <div class="sw"><div class="chip" style="background:var(--expense)"></div><div class="name">expense</div><div class="hex">#FF6F61</div></div>
    <div class="sw"><div class="chip" style="background:var(--settle)"></div><div class="name">settle</div><div class="hex">#8B7CF8</div></div>
    <div class="sw"><div class="chip" style="background:var(--health-amber)"></div><div class="name">health-amber</div><div class="hex">#F5B301</div></div>
    <div class="sw"><div class="chip" style="background:var(--health-red)"></div><div class="name">health-red</div><div class="hex">#FF5C5C</div></div>
  </div>
</body>
</html>
