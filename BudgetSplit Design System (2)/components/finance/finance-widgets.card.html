<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/feather-icons"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-ui); padding: 24px; }
  .grid { display:grid; grid-template-columns: 1.1fr 1fr; gap: 22px; align-items:start; }
  .stack { display:flex; flex-direction:column; gap: 14px; }
  .label { color: var(--text-secondary); font-size: 11px; text-transform:uppercase; letter-spacing:0.5px; }
  .amts { display:flex; gap: 18px; align-items:baseline; }
  .chips { display:flex; gap: 8px; flex-wrap:wrap; }
  .avatars { display:flex; }
  .avatars > span { margin-left: -8px; }
  .relbox { position: relative; height: 96px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { AmountText, TransactionRow, BudgetBar, CategoryChip, Badge, MemberAvatar, Card, Divider, FAB } = window.BudgetSplitDesignSystem_f6e8de;
  function Demo() {
    return (
      <div className="grid">
        <div className="stack">
          <div className="amts">
            <AmountText paise={1850000} size="lg" forceColor="var(--text-primary)" rounded />
            <AmountText paise={120000} size="md" showSign />
            <AmountText paise={-45000} size="sm" />
          </div>
          <Card padded={false} style={{padding:'4px 16px'}}>
            <TransactionRow category="Groceries" note="BigBasket" icon="shopping-cart" color="#3ECF8E" paise={-128000} />
            <Divider inset={56} />
            <TransactionRow category="Salary" kind="income" paise={6500000} />
            <Divider inset={56} />
            <TransactionRow category="Settle with Priya" kind="settlement" paise={-90000} />
          </Card>
        </div>
        <div className="stack">
          <div>
            <div className="label" style={{marginBottom:8}}>Budget health</div>
            <div className="stack">
              <BudgetBar pct={42} health="green" />
              <BudgetBar pct={82} health="amber" />
              <BudgetBar pct={108} health="red" />
            </div>
          </div>
          <div className="chips">
            <CategoryChip label="All" selected />
            <CategoryChip label="Groceries" icon="shopping-cart" color="#3ECF8E" />
            <CategoryChip label="Rent" icon="home" color="#7C6AF7" />
          </div>
          <div className="chips">
            <Badge label="2 over budget" icon="alert-triangle" tone="expense" />
            <Badge label="3 near limit" icon="clock" tone="amber" />
          </div>
          <div className="avatars">
            <MemberAvatar name="Aman Verma" color="#3182CE" />
            <MemberAvatar name="Priya Singh" color="#B83280" />
            <MemberAvatar name="Rohit K" color="#38A169" />
          </div>
          <div className="relbox">
            <FAB onClick={()=>{}} style={{bottom:0,right:0}} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
