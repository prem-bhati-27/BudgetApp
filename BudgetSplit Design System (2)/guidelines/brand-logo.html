<!-- @dsCard group="Brand" viewport="700x200" name="Logo & Wordmark" subtitle="The donut mark + BudgetSplit wordmark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-ui); padding: 28px; display:flex; gap: 40px; align-items:center; }
  .lockup { display:flex; align-items:center; gap: 16px; }
  .lockup img { width: 64px; height: 64px; border-radius: 18px; }
  .word { font-size: 30px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; }
  .word b { color: var(--accent); font-weight: 700; }
  .marks { display:flex; gap: 18px; align-items:center; margin-left:auto; }
  .marks img { width: 52px; height: 52px; }
  .onlight { width:52px;height:52px;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center; }
  .onlight img { width:40px;height:40px; }
</style>
</head>
<body>
  <div class="lockup">
    <img src="../assets/logo-icon.png" alt="BudgetSplit" />
    <div class="word">Budget<b>Split</b></div>
  </div>
  <div class="marks">
    <img src="../assets/logo-mark.png" alt="mark" />
    <div class="onlight"><img src="../assets/logo-mark.png" alt="mark on light" /></div>
  </div>
</body>
</html>
