<!-- @dsCard group="Colors" viewport="700x150" name="Text & Gradients" subtitle="Text hierarchy and the two brand gradients" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-ui); padding: 20px; display:flex; gap: 28px; align-items: center; }
  .texts { display:flex; flex-direction:column; gap: 8px; flex: 1; }
  .texts div { font-size: 18px; font-weight: 600; }
  .grads { display:flex; gap: 14px; flex: 1; }
  .g { flex:1; }
  .chip { height: 72px; border-radius: var(--radius-md); }
  .name { color: var(--text-muted); font-size: 11px; font-family: var(--font-mono); margin-top: 8px; }
</style>
</head>
<body>
  <div class="texts">
    <div style="color:var(--text-primary)">text-primary · #ECF3F1</div>
    <div style="color:var(--text-secondary)">text-secondary · #8FA3A0</div>
    <div style="color:var(--text-muted)">text-muted · #5A6B69</div>
  </div>
  <div class="grads">
    <div class="g"><div class="chip" style="background:var(--gradient-accent)"></div><div class="name">gradient-accent</div></div>
    <div class="g"><div class="chip" style="background:var(--gradient-brand)"></div><div class="name">gradient-brand</div></div>
  </div>
</body>
</html>
