<!-- @dsCard group="Spacing" viewport="700x160" name="Corner Radii" subtitle="sm 8 · md 12 · lg 16 · pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-ui); padding: 22px; display:flex; gap: 22px; align-items:flex-end; }
  .col { display:flex; flex-direction:column; align-items:center; gap: 10px; }
  .box { width: 80px; height: 56px; background: var(--bg-card); border:1px solid var(--border); }
  .name { color: var(--text-primary); font-size: 12px; font-weight:600; }
  .val { color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; }
</style>
</head>
<body>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="name">sm</div><div class="val">8px</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="name">md · buttons</div><div class="val">12px</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">lg · cards</div><div class="val">16px</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-pill);width:110px"></div><div class="name">pill · chips</div><div class="val">999px</div></div>
</body>
</html>
