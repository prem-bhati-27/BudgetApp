<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Soft black halos tuned for the dark theme" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-ui); padding: 30px 22px; display:flex; gap: 28px; align-items:center; }
  .col { display:flex; flex-direction:column; align-items:center; gap: 12px; }
  .box { width: 110px; height: 64px; background: var(--bg-card); border:1px solid var(--border); border-radius: var(--radius-lg); }
  .name { color: var(--text-primary); font-size: 12px; font-weight:600; }
  .val { color: var(--text-muted); font-family: var(--font-mono); font-size: 10px; }
</style>
</head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="name">shadow-sm</div><div class="val">cards, rows</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="name">shadow-md</div><div class="val">hero card</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="name">shadow-lg</div><div class="val">sheets, modals</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-fab);background:var(--gradient-brand);border:none"></div><div class="name">shadow-fab</div><div class="val">coral glow</div></div>
</body>
</html>
