<!-- @dsCard group="Type" viewport="700x180" name="Money — Space Mono" subtitle="The brand signature: all amounts in Space Mono" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-ui); padding: 22px; }
  .row { display:flex; align-items:baseline; gap: 16px; padding: 6px 0; }
  .amt { font-family: var(--font-mono); color: var(--text-primary); }
  .tag { color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; }
</style>
</head>
<body>
  <div class="row"><span class="amt" style="font-size:var(--amount-xl-size);letter-spacing:var(--amount-xl-spacing)">₹18,500</span><span class="tag">amount-xl · 36px</span></div>
  <div class="row"><span class="amt" style="font-size:var(--amount-lg-size);letter-spacing:var(--amount-lg-spacing)">₹4,250.00</span><span class="tag">amount-lg · 24px</span></div>
  <div class="row"><span class="amt" style="font-size:var(--amount-md-size)">₹1,200.00</span><span class="tag">amount-md · 18px</span></div>
  <div class="row"><span class="amt" style="font-size:var(--amount-sm-size)">−₹450.00</span><span class="tag">amount-sm · 14px</span></div>
</body>
</html>
