<!-- @dsCard group="Type" viewport="700x200" name="Body, Label, Caption & Button" subtitle="Inter Regular text roles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-ui); padding: 22px; }
  .row { display:flex; align-items:baseline; gap: 16px; padding: 5px 0; }
  .tag { color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; }
</style>
</head>
<body>
  <div class="row"><span style="font-size:var(--body-size);color:var(--text-primary)">Log a spend in two taps and see the full picture.</span><span class="tag">body · 15px</span></div>
  <div class="row"><span style="font-size:var(--label-size);color:var(--text-secondary)">Income</span><span class="tag">label · 13px</span></div>
  <div class="row"><span style="font-size:var(--caption-size);color:var(--text-muted)">Takes 20 seconds · no sign-up</span><span class="tag">caption · 11px</span></div>
  <div class="row"><span style="font-size:var(--label-size);color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px">Today · Yesterday · 14 Jun</span><span class="tag">section header · caps</span></div>
  <div class="row"><span style="font-size:var(--button-size);font-weight:600;color:var(--accent)">Settle Up</span><span class="tag">button · 15px / 600</span></div>
</body>
</html>
